map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name sconvert.ru www.sconvert.ru;

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nAllow: /\nSitemap: http://sconvert.ru/sitemap.xml\n";
    }

    location = /sitemap.xml {
        default_type application/xml;
        return 200 "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n  <url><loc>http://sconvert.ru/</loc></url>\n  <url><loc>http://sconvert.ru/?view=units</loc></url>\n  <url><loc>http://sconvert.ru/?view=btc</loc></url>\n  <url><loc>http://sconvert.ru/?view=about</loc></url>\n</urlset>\n";
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}

server {
    listen 80 default_server;
    server_name _;
    return 404;
}