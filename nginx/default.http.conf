map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name sconvert.ru www.sconvert.ru;

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nAllow: /\nSitemap: http://sconvert.ru/sitemap.xml\n";
    }

    location = /sitemap.xml {
        default_type application/xml;
        return 200 "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n  <url><loc>http://sconvert.ru/</loc></url>\n  <url><loc>http://sconvert.ru/?view=units</loc></url>\n  <url><loc>http://sconvert.ru/?view=btc</loc></url>\n  <url><loc>http://sconvert.ru/?view=about</loc></url>\n</urlset>\n";
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '<head>' '<head><meta name="description" content="sConvert: online converters for units, data formats, and Bitcoin tools."><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="http://sconvert.ru/"><meta property="og:type" content="website"><meta property="og:site_name" content="sConvert"><meta property="og:title" content="sConvert - converters and BTC tools"><meta property="og:description" content="Convert units, work with BTC keys/addresses, and use practical online tools."><meta property="og:url" content="http://sconvert.ru/"><meta property="og:image" content="http://sconvert.ru/og-image.png"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="sConvert - converters and BTC tools"><meta name="twitter:description" content="Convert units, work with BTC keys/addresses, and use practical online tools."><meta name="twitter:image" content="http://sconvert.ru/og-image.png">';
    }
}

server {
    listen 80 default_server;
    server_name _;
    return 404;
}